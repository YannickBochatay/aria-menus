<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Desktop menu">
    <title>Desktop menu</title>
    <script src="../src/index.js" type="module"></script>
    <style>
      :not(:defined) {
        visibility: hidden;
      }
      :root {
        font-family:Arial, Helvetica, sans-serif;
        color:#222;
      }
      #result {
        font-size:4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Desktop menu</h1>
    </header>
    <main>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/" target="_blank">Reference W3C</a>
      </p>
      <nav aria-label="menu example">
        <menu-bar>
          <menu-item>
            <span>File</span>
            <menu-list slot="menu">
              <menu-item info="Ctrl+A" id="selectAll">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                <span slot="label">aaaaa</span>
              </menu-item>
              <menu-item disabled>bbbbb</menu-item>
              <menu-checkbox id="checkbox">hhhhh</menu-checkbox>
              <menu-checkbox disabled>jjjjjj</menu-checkbox>
              <menu-separator></menu-separator>
              <menu-item>
                ccccc
                <menu-list slot="menu">
                  <menu-item>ddddd</menu-item>
                  <menu-item>
                    eeeee
                    <menu-list slot="menu">
                      <menu-item>fffff</menu-item>
                      <menu-item>ggggg</menu-item>
                    </menu-list>
                  </menu-item>
                </menu-list>
              </menu-item>
            </menu-list>
          </menu-item>
          <menu-item>
            Edition
            <menu-list slot="menu">
              <menu-item info="Ctrl+A">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                aaaaa
              </menu-item>
              <menu-item disabled>bbbbb</menu-item>
              <menu-checkbox>hhhhh</menu-checkbox>
              <menu-checkbox disabled>jjjjjj</menu-checkbox>
              <menu-separator></menu-separator>
              <menu-item>
                ccccc
                <menu-list slot="menu">
                  <menu-item>ddddd</menu-item>
                  <menu-item>
                    eeeee
                    <menu-list slot="menu">
                      <menu-item>fffff</menu-item>
                      <menu-item>ggggg</menu-item>
                    </menu-list>
                  </menu-item>
                </menu-list>
              </menu-item>
            </menu-list>
          </menu-item>
        </menu-bar>
      </nav>
      <div id="result" tabindex="0"></div>
      <menu-context for="result">
        <menu-list>
          <menu-item>ddddd</menu-item>
          <menu-item>
            eeeee
            <menu-list slot="menu">
              <menu-item>fffff</menu-item>
              <menu-item>ggggg</menu-item>
            </menu-list>
          </menu-item>
        </menu-list>
      </menu-context>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
    </main>
    <script type="module">
      const menubar = document.querySelector("menu-bar");
      function print(str) {
        document.querySelector("#result").textContent = str;
      }
      document.querySelector("#selectAll").addEventListener("select", () => {
        print("select All !");
        menubar.close();
      });
      document.querySelector("#checkbox").addEventListener("change", e => {
        print("checkbox is " + (e.target.checked ? "checked" : "unchecked"));
        // menubar.close();
      })
    </script>
  </body>
</html>
