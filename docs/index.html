<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Desktop menu">
    <title>Desktop menu</title>
    <script src="../src/index.js" type="module"></script>
  </head>
  <body>
    <header>
      <h1>Desktop menu</h1>
    </header>
    <main>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
      <nav aria-label="menu example">
        <desktop-menu>
          <desktop-menu-item label="aaaaa">
            <img src="img/icon.svg" alt="linux icon" slot="icon"/>
            <span slot="info">Ctrl+a</span>
          </desktop-menu-item>
          <desktop-menu-item label="bbbbb"></desktop-menu-item>
          <desktop-menu-separator></desktop-menu-separator>
          <desktop-menu-item label="ccccc">
            <desktop-menu slot="submenu">
              <desktop-menu-item label="ddddd"></desktop-menu-item>
              <desktop-menu-item label="eeeee">
                <desktop-menu slot="submenu">
                  <desktop-menu-item label="fffff"></desktop-menu-item>
                  <desktop-menu-item label="ggggg"></desktop-menu-item>
                </desktop-menu>
              </desktop-menu-item>
            </desktop-menu>
          </desktop-menu-item>
        </desktop-menu>
      </nav>
    </main>    
  </body>
</html>
