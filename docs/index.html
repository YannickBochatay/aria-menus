<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Desktop menu">
    <title>Desktop menu</title>
    <script src="../src/index.js" type="module"></script>
    <style>
      :not(:defined) {
        visibility: hidden;
      }
      :root {
        font-family:Arial, Helvetica, sans-serif;
        color:#222;
      }
      #result {
        font-size:4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Desktop menu</h1>
    </header>
    <main>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
      <nav aria-label="menu example">
        <desktop-menubar>
          <desktop-menubar-item>
            <span>File</span>
            <desktop-menu slot="menu">
              <desktop-menu-item shortcut="Ctrl+A" id="selectAll">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                aaaaa
              </desktop-menu-item>
              <desktop-menu-item disabled>bbbbb</desktop-menu-item>
              <desktop-menu-checkbox id="checkbox">hhhhh</desktop-menu-checkbox>
              <desktop-menu-checkbox disabled>jjjjjj</desktop-menu-checkbox>
              <desktop-menu-separator></desktop-menu-separator>
              <desktop-menu-item>
                ccccc
                <desktop-menu slot="submenu">
                  <desktop-menu-item>ddddd</desktop-menu-item>
                  <desktop-menu-item>
                    eeeee
                    <desktop-menu slot="submenu">
                      <desktop-menu-item>fffff</desktop-menu-item>
                      <desktop-menu-item>ggggg</desktop-menu-item>
                    </desktop-menu>
                  </desktop-menu-item>
                </desktop-menu>
              </desktop-menu-item>
            </desktop-menu>
          </desktop-menubar-item>
          <desktop-menubar-item>
            Edition
            <desktop-menu slot="menu">
              <desktop-menu-item shortcut="Ctrl+A">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                aaaaa
              </desktop-menu-item>
              <desktop-menu-item disabled>bbbbb</desktop-menu-item>
              <desktop-menu-checkbox>hhhhh</desktop-menu-checkbox>
              <desktop-menu-checkbox disabled>jjjjjj</desktop-menu-checkbox>
              <desktop-menu-separator></desktop-menu-separator>
              <desktop-menu-item>
                ccccc
                <desktop-menu slot="submenu">
                  <desktop-menu-item>ddddd</desktop-menu-item>
                  <desktop-menu-item>
                    eeeee
                    <desktop-menu slot="submenu">
                      <desktop-menu-item>fffff</desktop-menu-item>
                      <desktop-menu-item>ggggg</desktop-menu-item>
                    </desktop-menu>
                  </desktop-menu-item>
                </desktop-menu>
              </desktop-menu-item>
            </desktop-menu>
          </desktop-menubar-item>
        </desktop-menubar>
      </nav>
      <p id="result"></p>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
      <desktop-contextmenu for="result">
        <desktop-menu>
          <desktop-menu-item>ddddd</desktop-menu-item>
          <desktop-menu-item>
            eeeee
            <desktop-menu slot="submenu">
              <desktop-menu-item>fffff</desktop-menu-item>
              <desktop-menu-item>ggggg</desktop-menu-item>
            </desktop-menu>
          </desktop-menu-item>
        </desktop-menu>
      </desktop-contextmenu>
    </main>
    <script type="module">
      const menubar = document.querySelector("desktop-menubar");
      function print(str) {
        document.querySelector("#result").textContent = str;
      }
      document.querySelector("#selectAll").addEventListener("select", () => {
        print("select All !");
        menubar.close();
      });
      document.querySelector("#checkbox").addEventListener("change", e => {
        print("checkbox is " + (e.target.checked ? "checked" : "unchecked"));
        menubar.close();
      })
    </script>
  </body>
</html>
