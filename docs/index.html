<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Desktop menu">
    <title>Desktop menu</title>
    <script src="../src/index.js" type="module"></script>
    <style>
      :not(:defined) {
        visibility: hidden;
      }
      :root {
        font-family:Arial, Helvetica, sans-serif;
        color:#222;
      }
      #result {
        font-size:4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Desktop menu</h1>
    </header>
    <main>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/" target="_blank">Reference W3C</a>
      </p>
      
      <p>
        <menu-button>
          ccccc
          <menu-list slot="menu">
            <menu-link>ddddd</menu-link>
            <menu-action id="menu-action-k" info="exec">kkkkk</menu-action>
            <menu-sub>
              eeeee
              <menu-list slot="menu">
                <menu-action>fffff</menu-action>
                <menu-action>ggggg</menu-action>
              </menu-list>
            </menu-sub>
            <menu-input type="radio" name="zoom">100%</menu-input>
            <menu-input type="radio" name="zoom">80%</menu-input>
            <menu-input type="radio" name="zoom">60%</menu-input>
            <menu-input>bold</menu-input>
            <menu-input>italic</menu-input>
            <menu-input>underline</menu-input>
          </menu-list>
        </menu-button>
      </p>
      <nav aria-label="menu example">
        <menu-bar>
          <menu-sub nocaret>
            <span>File</span>
            <menu-list slot="menu">
              <menu-action info="Ctrl+A" id="selectAll">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                <span slot="label">aaaaa</span>
              </menu-action>
              <menu-action disabled>bbbbb</menu-action>
              <menu-input id="checkbox">hhhhh</menu-input>
              <menu-input disabled>toto tata toto</menu-input>
              <menu-separator></menu-separator>
              <menu-sub>
                ccccc
                <menu-list slot="menu">
                  <menu-action>ddddd</menu-action>
                  <menu-sub>
                    eeeee
                    <menu-list slot="menu">
                      <menu-action>fffff</menu-action>
                      <menu-action>ggggg</menu-action>
                    </menu-list>
                  </menu-sub>
                </menu-list>
              </menu-sub>
            </menu-list>
          </menu-sub>
          <menu-sub nocaret>
            Edition
            <menu-list slot="menu">
              <menu-action info="Ctrl+A">
                <img src="img/icon.svg" alt="linux icon" slot="icon"/>
                aaaaa
              </menu-action>
              <menu-action disabled>bbbbb</menu-action>
              <menu-input>hhhhh</menu-input>
              <menu-input disabled>jjjjjj</menu-input>
              <menu-separator></menu-separator>
              <menu-sub>
                ccccc
                <menu-list slot="menu">
                  <menu-action>ddddd</menu-action>
                  <menu-sub>
                    eeeee
                    <menu-list slot="menu">
                      <menu-action>fffff</menu-action>
                      <menu-action>ggggg</menu-action>
                    </menu-list>
                  </menu-sub>
                </menu-list>
              </menu-sub>
            </menu-list>
          </menu-sub>
          <menu-sub href="#toto" disabled>
            Test
          </menu-sub>
        </menu-bar>
      </nav>
      <div id="result" tabindex="0"></div>
      <menu-context for="result">
        <menu-list>
          <menu-action>ddddd</menu-action>
          <menu-sub>
            eeeee
            <menu-list slot="menu">
              <menu-action>fffff</menu-action>
              <menu-action>ggggg</menu-action>
            </menu-list>
          </menu-sub>
        </menu-list>
      </menu-context>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
    </main>
    <script type="module">
      const menubar = document.querySelector("menu-bar");
      function print(str) {
        document.querySelector("#result").textContent = str;
      }
      document.querySelector("#menu-action-k").addEventListener("click", () => {
        print("action executed ! " + Math.random());
      })
      document.querySelector("#selectAll").addEventListener("select", () => {
        print("select All !");
        menubar.close();
      });
      document.querySelector("#checkbox").addEventListener("change", e => {
        print("checkbox is " + (e.target.checked ? "checked" : "unchecked"));
        // menubar.close();
      })
    </script>
  </body>
</html>
