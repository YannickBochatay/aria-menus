<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Desktop menu">
    <title>Desktop menu</title>
    <script src="../src/index.js" type="module"></script>
    <style>
      :not(:defined) {
        visibility: hidden;
      }
      :root {
        font-family:Arial, Helvetica, sans-serif;
        color:#222;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Desktop menu</h1>
    </header>
    <main>
      <p>
        <a href="https://www.w3.org/WAI/ARIA/apg/patterns/menubar/examples/menubar-navigation/">Reference W3C</a>
      </p>
      <nav aria-label="menu example">
        <desktop-menu>
          <desktop-menu-item label="aaaaa" shortcut="Ctrl+A" id="selectAll">
            <img src="img/icon.svg" alt="linux icon" slot="icon"/>
          </desktop-menu-item>
          <desktop-menu-item label="bbbbb" disabled></desktop-menu-item>
          <desktop-menu-checkbox label="hhhhh" id="checkbox"></desktop-menu-checkbox>
          <desktop-menu-checkbox label="jjjjjj" disabled></desktop-menu-checkbox>
          <desktop-menu-separator></desktop-menu-separator>
          <desktop-menu-item label="ccccc">
            <desktop-menu slot="submenu">
              <desktop-menu-item label="ddddd"></desktop-menu-item>
              <desktop-menu-item label="eeeee">
                <desktop-menu slot="submenu">
                  <desktop-menu-item label="fffff"></desktop-menu-item>
                  <desktop-menu-item label="ggggg"></desktop-menu-item>
                </desktop-menu>
              </desktop-menu-item>
            </desktop-menu>
          </desktop-menu-item>
        </desktop-menu>
      </nav>
      <p id="result"></p>
    </main>
    <script type="module">
      function print(str) {
        document.querySelector("#result").textContent = str;
      }
      document.querySelector("#selectAll").addEventListener("select", () => {
        print("select All !");
      });
      document.querySelector("#checkbox").addEventListener("change", e => {
        print("checkbox is " + (e.target.checked ? "checked" : "unchecked"));
      })
    </script>
  </body>
</html>
